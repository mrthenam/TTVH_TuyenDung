<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dữ liệu tuyển dụng (1Office) — Thịnh Thế Vinh Hoa</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#fff8f0;--card:#fff;--line:rgba(54,28,18,.10);--line-2:rgba(54,28,18,.18);
    --txt:#2a1810;--muted:#8b7060;--red:#e0342b;--gold:#f4a521;--amber:#ff7a1a;--green:#2faa5e;
    --grad:linear-gradient(135deg,#ff7a1a 0%,#e0342b 100%);
    --grad-soft:linear-gradient(135deg,rgba(244,165,33,.16),rgba(224,52,43,.06));
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Be Vietnam Pro',system-ui,sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1280px;margin:0 auto;padding:0 20px}

  header{position:sticky;top:0;z-index:30;background:rgba(255,248,240,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:68px;gap:16px}
  .brand{display:flex;align-items:center;gap:12px;font-weight:900}
  .brand img{height:46px;width:auto;border-radius:10px}
  .brand small{display:block;font-size:11px;color:var(--muted);font-weight:700}
  .back{font-size:14px;font-weight:700;color:var(--muted);padding:9px 16px;border:1px solid var(--line-2);border-radius:10px;background:#fff}
  .back:hover{background:#fff7ea}

  .head{padding:30px 0 10px}
  .head h1{font-size:clamp(24px,4vw,34px);font-weight:900;letter-spacing:-.02em}
  .head p{color:var(--muted);margin-top:4px}

  .tabs{display:flex;gap:10px;flex-wrap:wrap;margin:22px 0}
  .tab{display:flex;align-items:center;gap:9px;padding:12px 18px;border-radius:12px;border:1px solid var(--line-2);background:#fff;font-weight:700;font-size:14px;cursor:pointer;transition:.15s}
  .tab .ic{font-size:18px}
  .tab .cnt{font-size:12px;font-weight:800;color:var(--muted);background:var(--grad-soft);padding:2px 9px;border-radius:999px}
  .tab:hover{transform:translateY(-2px)}
  .tab.active{background:var(--grad);color:#fff;border-color:transparent}
  .tab.active .cnt{color:#fff;background:rgba(255,255,255,.25)}

  .toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .search{flex:1;min-width:220px;position:relative}
  .search input{width:100%;padding:12px 14px 12px 40px;border-radius:11px;border:1px solid var(--line-2);background:#fff;font-family:inherit;font-size:14px}
  .search input:focus{outline:none;border-color:var(--red)}
  .search .mag{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:800;font-size:14px;cursor:pointer;border:none;padding:12px 18px;border-radius:11px;transition:.15s}
  .btn-primary{background:var(--grad);color:#fff}
  .btn-primary:hover{transform:translateY(-2px)}
  .btn-ghost{background:#fff;border:1px solid var(--line-2);color:var(--txt)}
  .meta-line{font-size:13px;color:var(--muted);margin-left:auto}

  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 18px 44px -34px rgba(224,52,43,.45)}
  .table-scroll{overflow:auto;max-height:70vh}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:600px}
  thead th{position:sticky;top:0;background:#fff7ea;text-align:left;font-weight:800;padding:13px 16px;white-space:nowrap;border-bottom:1px solid var(--line);z-index:1}
  tbody td{padding:12px 16px;border-bottom:1px solid var(--line);vertical-align:top;max-width:340px;overflow:hidden;text-overflow:ellipsis}
  tbody tr:hover{background:#fff9f2}
  tbody td .pill{display:inline-block;background:var(--grad-soft);color:var(--red);font-weight:700;font-size:12px;padding:3px 10px;border-radius:999px}
  .idx{color:var(--muted);font-variant-numeric:tabular-nums}

  .state{padding:60px 20px;text-align:center;color:var(--muted)}
  .state .big{font-size:40px;margin-bottom:12px}
  .spinner{width:38px;height:38px;border-radius:50%;border:4px solid var(--line);border-top-color:var(--red);animation:spin .8s linear infinite;margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{color:var(--red)}
  .warn-box{background:#fff;border:1px dashed rgba(224,52,43,.4);border-radius:12px;padding:16px 18px;color:var(--txt);font-size:14px;text-align:left;max-width:680px;margin:14px auto 0}
  .warn-box code{background:#fff2e6;padding:1px 7px;border-radius:6px;font-size:13px}
  footer{padding:30px 0;text-align:center;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <a href="index.html" class="brand">
      <img src="images/logo-ttvh.jpg" alt="Thịnh Thế Vinh Hoa" />
      <div>Thịnh Thế Vinh Hoa<small>Bảng dữ liệu tuyển dụng</small></div>
    </a>
    <div style="display:flex;gap:8px;align-items:center">
      <a href="kanban.html" class="back">📋 Kanban phân loại</a>
      <a href="index.html" class="back">← Trang tuyển dụng</a>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="head">
    <h1>Dữ liệu tuyển dụng từ 1Office</h1>
    <p>Dữ liệu được lấy trực tiếp qua API 1Office (token bảo mật ở server).</p>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="toolbar">
    <div class="search"><span class="mag">🔍</span><input id="search" type="text" placeholder="Tìm trong bảng..." /></div>
    <button class="btn btn-ghost" id="colsBtn">▦ Tất cả cột</button>
    <button class="btn btn-ghost" id="exportBtn">⬇ Xuất CSV</button>
    <button class="btn btn-primary" id="reloadBtn">↻ Tải lại</button>
    <span class="meta-line" id="metaLine"></span>
  </div>

  <div class="panel">
    <div id="content"></div>
  </div>
</main>

<footer>© 2026 Thịnh Thế Vinh Hoa F&amp;B Group · Vững thời · Sáng vận · Đẹp danh</footer>

<script>
const TABS = [
  { key:'candidates', label:'Hồ sơ ứng viên',        ic:'🧑‍💼' },
  { key:'proposals',  label:'Đề xuất tuyển dụng',     ic:'📝' },
  { key:'campaigns',  label:'Chiến dịch tuyển dụng',  ic:'📢' },
  { key:'channels',   label:'Kênh tuyển dụng',        ic:'🌐' },
];

// Cột ưu tiên + nhãn tiếng Việt cho từng mục (dựa trên field thật của API).
// Mục nào không có preset sẽ tự nhận diện toàn bộ cột.
const COLUMN_PRESETS = {
  candidates: [
    {f:'code',l:'Mã hồ sơ'}, {f:'name',l:'Họ và tên'}, {f:'gender',l:'Giới tính'},
    {f:'birthday',l:'Ngày sinh'}, {f:'phone',l:'Điện thoại'}, {f:'email',l:'Email'},
    {f:'designation',l:'Danh xưng'}, {f:'campaign_code',l:'Mã chiến dịch'},
    {f:'channel_sub',l:'Kênh'}, {f:'source',l:'Nguồn'}, {f:'salary_want',l:'Lương mong muốn'},
    {f:'current_address',l:'Địa chỉ'}, {f:'date_filing',l:'Ngày nộp HS'},
    {f:'interview_date',l:'Ngày phỏng vấn'}, {f:'status',l:'Trạng thái'}, {f:'date_created',l:'Ngày tạo'},
  ],
};

const cache = {};          // key -> {rows, raw, error, total}
let current = TABS[0].key;
let filter = '';
let showAll = false;       // false = chỉ cột ưu tiên, true = tất cả cột

const $ = (s) => document.querySelector(s);
const tabsEl = $('#tabs'), contentEl = $('#content'), metaEl = $('#metaLine');

function renderTabs(){
  tabsEl.innerHTML = '';
  TABS.forEach(t => {
    const c = cache[t.key];
    const cnt = c && c.rows ? c.rows.length : '–';
    const el = document.createElement('button');
    el.className = 'tab' + (t.key===current?' active':'');
    el.innerHTML = `<span class="ic">${t.ic}</span> ${t.label} <span class="cnt">${cnt}</span>`;
    el.onclick = () => { current = t.key; filter=''; $('#search').value=''; render(); if(!cache[t.key]) load(t.key); };
    tabsEl.appendChild(el);
  });
}

function fmtCell(v){
  if (v === null || v === undefined || v === '') return '<span class="idx">—</span>';
  if (typeof v === 'object') return '<span class="idx">'+escapeHtml(JSON.stringify(v)).slice(0,120)+'</span>';
  return escapeHtml(String(v));
}
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// Trả về danh sách cột dạng [{f: field, l: nhãn}].
function columnsOf(rows){
  const preset = COLUMN_PRESETS[current];
  if (preset && !showAll){
    const present = rows.length ? rows[0] : {};
    // chỉ giữ cột thực sự có trong dữ liệu
    const cols = preset.filter(c => rows.some(r => r && c.f in r));
    return cols.length ? cols : preset;
  }
  const keys = [];
  rows.slice(0, 40).forEach(r => {
    if (r && typeof r === 'object') Object.keys(r).forEach(k => { if(!keys.includes(k)) keys.push(k); });
  });
  return keys.map(k => ({ f:k, l:k }));
}

function render(){
  renderTabs();
  const c = cache[current];
  const tabLabel = TABS.find(t=>t.key===current).label;

  if (!c){ contentEl.innerHTML = stateLoading(); metaEl.textContent=''; return; }
  if (c.loading){ contentEl.innerHTML = stateLoading(); metaEl.textContent=''; return; }
  if (c.error){ contentEl.innerHTML = stateError(c.error, c.detail); metaEl.textContent=''; return; }

  let rows = c.rows || [];
  if (!rows.length){
    contentEl.innerHTML = `<div class="state"><div class="big">📭</div>Chưa có dữ liệu cho “${tabLabel}”.
      ${c.raw?'<div class="warn-box">API có trả về dữ liệu nhưng không phải dạng danh sách. Cấu trúc nhận được:<br><code>'+escapeHtml(JSON.stringify(c.raw)).slice(0,500)+'</code><br>Hãy đặt <code>dataPath</code> trong config.json trỏ tới mảng.</div>':''}</div>`;
    metaEl.textContent=''; return;
  }

  // filter
  if (filter){
    const f = filter.toLowerCase();
    rows = rows.filter(r => JSON.stringify(r).toLowerCase().includes(f));
  }
  const cols = columnsOf(c.rows);
  let html = '<div class="table-scroll"><table><thead><tr><th>#</th>';
  cols.forEach(col => html += '<th>'+escapeHtml(col.l)+'</th>');
  html += '</tr></thead><tbody>';
  rows.forEach((r,i) => {
    html += '<tr><td class="idx">'+(i+1)+'</td>';
    cols.forEach(col => html += '<td>'+fmtCell(r ? r[col.f] : null)+'</td>');
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  contentEl.innerHTML = html;
  const totalTxt = (c.total != null && c.total > c.rows.length) ? (' · tổng ' + c.total + ' trên 1Office') : '';
  metaEl.textContent = rows.length + ' / ' + c.rows.length + ' đã tải' + totalTxt;
}

function stateLoading(){ return '<div class="state"><div class="spinner"></div>Đang tải dữ liệu…</div>'; }
function stateError(msg, detail){
  let extra = '';
  if (/token/i.test(msg)) extra = '<div class="warn-box">Mở <code>config.json</code> → dán token vào <code>oneOffice.token</code> và sửa <code>endpoints</code> cho đúng, rồi bấm <b>Tải lại</b>.</div>';
  else extra = '<div class="warn-box">Kiểm tra <code>baseUrl</code>, <code>endpoints</code> và <code>tokenMode</code> trong <code>config.json</code>.'+(detail?'<br>Chi tiết: <code>'+escapeHtml(detail).slice(0,400)+'</code>':'')+'</div>';
  return '<div class="state err"><div class="big">⚠️</div>'+escapeHtml(msg)+extra+'</div>';
}

async function load(key){
  cache[key] = { loading:true };
  if (key===current) render();
  try {
    const res = await fetch('/api/'+key);
    const data = await res.json();
    if (!res.ok || data.error){
      cache[key] = { error: data.error || ('HTTP '+res.status), detail: data.preview };
    } else {
      cache[key] = { rows: data.rows || [], raw: data.raw, total: data.total };
    }
  } catch (e){
    cache[key] = { error: 'Không gọi được server proxy. Bạn đã chạy "node server.js" chưa?', detail:e.message };
  }
  renderTabs();
  if (key===current) render();
}

function toCSV(rows){
  if(!rows.length) return '';
  const cols = columnsOf(rows);
  const esc = v => '"'+String(v==null?'':(typeof v==='object'?JSON.stringify(v):v)).replace(/"/g,'""')+'"';
  const lines = [cols.map(c=>esc(c.l)).join(',')];
  rows.forEach(r => lines.push(cols.map(c=>esc(r?r[c.f]:'')).join(',')));
  return '﻿'+lines.join('\r\n');
}

$('#search').addEventListener('input', e => { filter = e.target.value.trim(); render(); });
$('#reloadBtn').addEventListener('click', () => load(current));
$('#colsBtn').addEventListener('click', (e) => {
  showAll = !showAll;
  e.target.classList.toggle('btn-primary', showAll);
  e.target.classList.toggle('btn-ghost', !showAll);
  e.target.textContent = showAll ? '▦ Cột rút gọn' : '▦ Tất cả cột';
  render();
});
$('#exportBtn').addEventListener('click', () => {
  const c = cache[current]; if(!c || !c.rows || !c.rows.length) return alert('Chưa có dữ liệu để xuất.');
  const blob = new Blob([toCSV(c.rows)], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = current + '_1office.csv';
  a.click();
});

renderTabs();
render();
load(current);
</script>
</body>
</html>
